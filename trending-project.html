<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Shared Utils & Components -->
    <script src="assets/js/utils.js"></script>
    <script>window.initGA();</script>
    
    <title>Trending Project - Asstar</title>
    <link rel="icon" type="image/png" href="assets/img/chengtailang.jpg"/>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/sprite-chat.css">
    <style>
        /* Project-specific styles */
        .repo-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .repo-icon {
            width: 40px;
            height: 40px;
            background: #ffffff;
            color: #000000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .repo-info h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .repo-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .repo-description, .model-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .repo-stats, .model-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-item i {
            color: #ffffff;
        }

        .repo-languages, .model-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .language-tag, .tag {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ffffff;
        }

        .repo-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            background: transparent;
            padding: 8px 0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .repo-link:hover {
            color: #ffffff;
            transform: translateX(5px);
            text-decoration: underline;
        }
    </style>
   <!-- Sprite Chat Styles -->
    <link rel="stylesheet" href="assets/css/sprite-chat.css">
</head>

<body>
    <!-- Components injected by js/components.js -->
    <script src="assets/js/components.js"></script>

    <main>
        <section class="trending-container">
            <div class="container">
                <div class="trending-header">
                    <h1 class="trending-title">Trending Project</h1>
                    <p class="trending-subtitle" id="last-updated">Synchronizing Quantum Data...</p>
                    <div class="source-tabs" id="source-tabs">
                        <button class="source-tab active" data-source="github">GitHub</button>
                        <button class="source-tab" data-source="huggingface">HuggingFace</button>
                        <button class="source-tab" data-source="interest">Interest</button>
                    </div>
                    <div id="controls"></div>
                </div>
                <div id="trending-content">
                    <!-- skeleton will be injected by JS -->
                </div>
            </div>
        </section>
    </main>
    <script src="assets/js/script.js"></script>
    <script src="assets/lab/config.js"></script>
    <script src="assets/js/sprite-chat.js"></script>
    <script>
        // Initialize sprite chat with custom options for trending projects page
        document.addEventListener('DOMContentLoaded', () => {
            if (window.SpriteChatManager) {
                window.spriteChatManager = new window.SpriteChatManager();
            }
        });
    </script>
    <script>
        (function () {
            class TrendingProject {
                constructor() {
                    this.source = 'github'; // 'github' | 'huggingface' | 'interest'
                    this.period = 'daily'; // github periods: daily | weekly | monthly
                    this.category = 'trending'; // hf categories: trending | likes | downloads
                    this.interestCat = 'voice'; // interest categories: voice | multimodal | vision
                    this.interestSubCat = 'text-to-speech';
                    this.subCategories = {
                        voice: ['text-to-speech', 'automatic-speech-recognition', 'text-to-audio', 'voice-activity-detection', 'audio-to-audio', 'audio-classification'],
                        multimodal: ['audio-text-to-text', 'image-text-to-video', 'image-text-to-image', 'image-text-to-text', 'visual-question-answering', 'document-question-answering'],
                        vision: ['image-classification', 'object-detection', 'image-segmentation', 'zero-shot-image-classification', 'zero-shot-object-detection', 'image-feature-extraction']
                    };
                    this.githubData = [];
                    this.hfData = [];
                    this.interestData = [];
                    this.init();
                }

                init() {
                    window.initEntranceAnimation();
                    this.bindSourceTabs();
                    this.renderControls();
                    this.loadData();
                    this.addExtras();
                    // Auto refresh every 6 hours
                    setInterval(() => this.loadData(), 6 * 60 * 60 * 1000);
                }

                bindSourceTabs() {
                    const tabs = document.querySelectorAll('.source-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            tabs.forEach(t => t.classList.remove('active'));
                            e.currentTarget.classList.add('active');
                            this.source = e.currentTarget.dataset.source;
                            this.renderControls();
                            this.loadData();
                        });
                    });
                }

                renderControls() {
                    const controls = document.getElementById('controls');
                    if (!controls) return;
                    if (this.source === 'github') {
                        controls.innerHTML = `
                        <div class="time-filter">
                            <button class="time-btn ${this.period === 'daily' ? 'active' : ''}" data-period="daily">今日</button>
                            <button class="time-btn ${this.period === 'weekly' ? 'active' : ''}" data-period="weekly">本周</button>
                            <button class="time-btn ${this.period === 'monthly' ? 'active' : ''}" data-period="monthly">本月</button>
                        </div>`;
                        controls.querySelectorAll('.time-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                controls.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                                e.currentTarget.classList.add('active');
                                this.period = e.currentTarget.dataset.period;
                                this.loadData();
                            });
                        });
                    } else if (this.source === 'huggingface') {
                        controls.innerHTML = `
                        <div class="category-filter">
                            <button class="category-btn ${this.category === 'trending' ? 'active' : ''}" data-category="trending">Trending</button>
                            <button class="category-btn ${this.category === 'likes' ? 'active' : ''}" data-category="likes">Most Likes</button>
                            <button class="category-btn ${this.category === 'downloads' ? 'active' : ''}" data-category="downloads">Most Downloads</button>
                        </div>`;
                        controls.querySelectorAll('.category-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                controls.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                                e.currentTarget.classList.add('active');
                                this.category = e.currentTarget.dataset.category;
                                this.loadData();
                            });
                        });
                    } else if (this.source === 'interest') {
                        let html = `
                        <div class="category-filter interest-main-filter" style="margin-bottom: 12px;">
                            <button class="category-btn ${this.interestCat === 'voice' ? 'active' : ''}" data-cat="voice">语音</button>
                            <button class="category-btn ${this.interestCat === 'multimodal' ? 'active' : ''}" data-cat="multimodal">多模态</button>
                            <button class="category-btn ${this.interestCat === 'vision' ? 'active' : ''}" data-cat="vision">视觉</button>
                        </div>
                        <div class="category-filter interest-sub-filter" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                        `;
                        const subs = this.subCategories[this.interestCat] || [];
                        subs.forEach(sub => {
                            html += `<button class="category-btn sub-btn ${this.interestSubCat === sub ? 'active' : ''}" data-subcat="${sub}" style="font-size: 0.85rem; padding: 6px 14px; border-radius: 20px;">${sub.replace(/-/g, ' ')}</button>`;
                        });
                        html += `</div>`;
                        controls.innerHTML = html;

                        controls.querySelectorAll('.interest-main-filter .category-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                controls.querySelectorAll('.interest-main-filter .category-btn').forEach(b => b.classList.remove('active'));
                                e.currentTarget.classList.add('active');
                                this.interestCat = e.currentTarget.dataset.cat;
                                this.interestSubCat = this.subCategories[this.interestCat][0];
                                this.renderControls();
                                this.loadData();
                            });
                        });

                        controls.querySelectorAll('.interest-sub-filter .sub-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                controls.querySelectorAll('.interest-sub-filter .sub-btn').forEach(b => b.classList.remove('active'));
                                e.currentTarget.classList.add('active');
                                this.interestSubCat = e.currentTarget.dataset.subcat;
                                this.renderInterest();
                            });
                        });
                    }
                }

                async loadData() {
                    const container = document.getElementById('trending-content');
                    const timeEl = document.getElementById('last-updated');
                    if (!container) return;
                    container.innerHTML = window.generateSkeleton(6);
                    try {
                        let list = [];
                        let rawJson = null;
                        if (this.source === 'github') {
                            const res = await fetch('feeds/trending-data.json', { cache: 'no-store' });
                            if (res.ok) {
                                rawJson = await res.json();
                                list = rawJson[this.period] || [];
                            }
                            this.githubData = list;
                            this.renderGithub();
                        } else if (this.source === 'huggingface') {
                            const res = await fetch('feeds/huggingface-data.json', { cache: 'no-store' });
                            if (res.ok) {
                                rawJson = await res.json();
                                list = rawJson[this.category] || [];
                            }
                            this.hfData = list;
                            this.renderHuggingface();
                        } else if (this.source === 'interest') {
                            const res = await fetch('feeds/huggingface-interest-data.json', { cache: 'no-store' });
                            if (res.ok) {
                                rawJson = await res.json();
                                list = rawJson[this.interestCat] || {};
                            }
                            this.interestData = list;
                            this.renderInterest();
                        }

                        if (timeEl && rawJson && rawJson.lastUpdated) {
                            const date = new Date(rawJson.lastUpdated);
                            const opts = {
                                timeZone: 'Asia/Shanghai',
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit',
                                hour12: false
                            };
                            const parts = new Intl.DateTimeFormat('zh-CN', opts).formatToParts(date);
                            const m = {};
                            parts.forEach(p => m[p.type] = p.value);
                            timeEl.innerText = `${m.year}.${m.month}.${m.day} ${m.hour}:${m.minute}:${m.second}`;
                        }
                    } catch (err) {
                        console.error('加载失败', err);
                        this.showError();
                    }
                }

                renderGithub() {
                    const container = document.getElementById('trending-content');
                    if (!this.githubData || this.githubData.length === 0) {
                        container.innerHTML = this.emptyHtml();
                        return;
                    }
                    const grid = document.createElement('div');
                    grid.className = 'trending-grid';
                    this.githubData.forEach(repo => grid.appendChild(this.githubCard(repo)));
                    container.innerHTML = '';
                    container.appendChild(grid);
                    window.animateCards(grid);
                }

                renderHuggingface() {
                    const container = document.getElementById('trending-content');
                    if (!this.hfData || this.hfData.length === 0) {
                        container.innerHTML = this.emptyHtml();
                        return;
                    }
                    const grid = document.createElement('div');
                    grid.className = 'trending-grid';
                    this.hfData.forEach(model => grid.appendChild(this.hfCard(model)));
                    container.innerHTML = '';
                    container.appendChild(grid);
                    window.animateCards(grid);
                }

                renderInterest() {
                    const container = document.getElementById('trending-content');
                    if (!this.interestData || Object.keys(this.interestData).length === 0) {
                        container.innerHTML = this.emptyHtml();
                        return;
                    }
                    container.innerHTML = '';
                    
                    const models = this.interestData[this.interestSubCat] || [];
                    if (models.length === 0) {
                        container.innerHTML = this.emptyHtml();
                        return;
                    }

                    const grid = document.createElement('div');
                    grid.className = 'trending-grid';
                    models.forEach(model => grid.appendChild(this.hfCard(model)));
                    container.appendChild(grid);
                    window.animateCards(grid);
                }

                githubCard(repo) {
                    const card = document.createElement('div');
                    card.className = 'trending-card';
                    const languages = repo.language ? [repo.language] : [];
                    card.innerHTML = `
                    <div class="trending-card-content">
                        <div class="repo-header">
                            <div class="repo-icon">📦</div>
                            <div class="repo-info">
                                <h3>${repo.name}</h3>
                                <p>${Array.isArray(repo.builtBy) ? `Built by ${repo.builtBy.slice(0, 3).join(', ')}${repo.builtBy.length > 3 ? ' and others' : ''}` : ''}</p>
                            </div>
                        </div>
                        <p class="repo-description">${repo.description || ''}</p>
                        <div class="repo-stats">
                            <div class="stat-item"><i>⭐</i><span>${repo.stars || ''}</span></div>
                            <div class="stat-item"><i>🔄</i><span>${repo.forks || ''}</span></div>
                            <div class="stat-item"><i>🚀</i><span>${repo.starsToday ? `${repo.starsToday} today` : ''}</span></div>
                        </div>
                        ${languages.length ? `<div class="repo-languages">${languages.map(l => `<span class="language-tag">${l}</span>`).join('')}</div>` : ''}
                        <a href="${repo.url}" target="_blank" class="repo-link">查看项目 <span>→</span></a>
                    </div>
                `;
                    return card;
                }

                hfCard(model) {
                    const card = document.createElement('div');
                    card.className = 'trending-card';
                    const tags = model.tags || [];
                    card.innerHTML = `
                    <div class="trending-card-content">
                        <div class="model-header">
                            <div class="model-icon">🤖</div>
                            <div class="model-info">
                                <h3>${model.name}</h3>
                                <p>${model.task || ''} • ${model.parameters || ''}</p>
                            </div>
                        </div>
                        <p class="model-description">${model.description || ''}</p>
                        <div class="model-stats">
                            <div class="stat-item"><i>❤️</i><span>${model.likes || ''}</span></div>
                            <div class="stat-item"><i>⬇️</i><span>${model.downloads || ''}</span></div>
                            <div class="stat-item"><i>📊</i><span>${model.parameters || ''}</span></div>
                        </div>
                        ${tags.length ? `<div class="model-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
                        <a href="${model.url}" target="_blank" class="model-link">查看模型 <span>→</span></a>
                    </div>
                `;
                    return card;
                }

                showError() {
                    const container = document.getElementById('trending-content');
                    container.innerHTML = `
                    <div class="error-message">
                        <p>加载数据时出现错误</p>
                        <button class="refresh-btn" id="refresh-btn">重新加载</button>
                    </div>
                `;
                    const btn = document.getElementById('refresh-btn');
                    if (btn) btn.addEventListener('click', () => this.loadData());
                }

                emptyHtml() {
                    return `
                    <div class="error-message">
                        <p>暂无数据</p>
                        <button class="refresh-btn" id="refresh-btn">重新加载</button>
                    </div>
                `;
                }

                addExtras() {
                    document.addEventListener('mouseover', (e) => {
                        const target = e.target.closest('.trending-card');
                        if (target) target.style.transform = 'translateY(-5px) scale(1.02)';
                    });
                    document.addEventListener('mouseout', (e) => {
                        const target = e.target.closest('.trending-card');
                        if (target) target.style.transform = 'translateY(0) scale(1)';
                    });
                    document.addEventListener('keydown', (e) => {
                        if (this.source === 'github') {
                            const btns = Array.from(document.querySelectorAll('.time-filter .time-btn'));
                            const active = document.querySelector('.time-filter .time-btn.active');
                            if (!active) return;
                            const idx = btns.indexOf(active);
                            if (e.key === 'ArrowLeft' && idx > 0) btns[idx - 1].click();
                            else if (e.key === 'ArrowRight' && idx < btns.length - 1) btns[idx + 1].click();
                        } else if (this.source === 'huggingface') {
                            const btns = Array.from(document.querySelectorAll('.category-filter .category-btn'));
                            const active = document.querySelector('.category-filter .category-btn.active');
                            if (!active) return;
                            const idx = btns.indexOf(active);
                            if (e.key === 'ArrowLeft' && idx > 0) btns[idx - 1].click();
                            else if (e.key === 'ArrowRight' && idx < btns.length - 1) btns[idx + 1].click();
                        } else if (this.source === 'interest') {
                            const btns = Array.from(document.querySelectorAll('.interest-sub-filter .sub-btn'));
                            const active = document.querySelector('.interest-sub-filter .sub-btn.active');
                            if (!active) return;
                            const idx = btns.indexOf(active);
                            if (e.key === 'ArrowLeft' && idx > 0) btns[idx - 1].click();
                            else if (e.key === 'ArrowRight' && idx < btns.length - 1) btns[idx + 1].click();
                        }
                    });
                }
            }

            function initTrendingProject() { 
                new TrendingProject();
                // Initialize sprite chat
                if (window.SpriteChatManager) {
                    window.spriteChatManager = new window.SpriteChatManager();
                }
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTrendingProject);
            } else {
                initTrendingProject();
            }
        })();
    </script>
    <script src="assets/js/sprite-chat.js"></script>
</body>

</html>
