<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Shared Utils & Components -->
    <script src="assets/js/utils.js"></script>
    <script>window.initGA();</script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <title>Asstar Space | Deep Universe</title>
    <link rel="icon" type="image/png" href="assets/img/chengtailang.jpg"/>
    <link rel="stylesheet" href="assets/css/common.css">
    <!-- Sprite Chat Styles -->
    <link rel="stylesheet" href="assets/css/sprite-chat.css">
    
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #7000ff;
            --glass-bg: rgba(10, 15, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a0a0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Exo 2', 'Montserrat', sans-serif;
            overflow: hidden;
            background: #000;
            color: var(--text-main);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 0 0 200px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 2;
        }

        /* Operation hint */
        .operation-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        /* Planet modal */
        .planet-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 380px;
            transform: translate(-50%, -50%) scale(0.95);
            opacity: 0;
            visibility: hidden;
            border-radius: 20px;
            padding: 40px;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .planet-modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover { color: var(--primary-color); }

        .modal-header h3 {
            font-family: 'Exo 2', sans-serif;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }

        .planet-type {
            text-align: center;
            color: var(--primary-color);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .planet-description {
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-dim);
            text-align: justify;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .group-section {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        .data-item { display: flex; flex-direction: column; align-items: center; }
        .data-label { color: rgba(255,255,255,0.3); margin-bottom: 5px; font-size: 10px; letter-spacing: 1px; }
        .data-value { color: #fff; font-weight: 500; letter-spacing: 1px; }

        .qrcode {
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        
        .qrcode:hover { transform: scale(1.05); }

        .action-btn {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(112, 0, 255, 0.1));
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            font-weight: 600;
            color: #000;
        }

        .info-toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-left: 3px solid var(--primary-color);
            padding: 15px 30px;
            color: #fff;
            font-size: 12px;
            letter-spacing: 1px;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000;
        }

        .info-toast.show { transform: translateX(0); }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease;
        }
        
        .loader-text {
            margin-top: 20px;
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--primary-color);
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 768px) {
            .planet-modal { width: 90%; padding: 25px; }
            .modal-header h3 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>

    <div class="loading-screen" id="loading-screen">
        <div class="loader-text">Initializing Universe...</div>
    </div>

    <!-- Components injected by js/components.js -->
    <script src="assets/js/components.js"></script>

    <div id="canvas-container"></div>
    
    <div class="operation-hint">
        Explore: Drag &bull; Scroll &bull; Click Planets
    </div>
    
    <!-- Planet Detail Modal -->
    <div class="planet-modal glass-panel" id="planet-modal">
        <button class="close-btn" id="close-modal">&times;</button>
        <div class="modal-header">
            <h3 id="modal-planet-name">Planet</h3>
            <div class="planet-type" id="modal-planet-type">Type</div>
        </div>
        
        <div class="modal-content">
            <div class="planet-description" id="modal-planet-description"></div>
            
            <div class="group-section">
                <div class="data-row">
                    <div class="data-item">
                        <span class="data-label">GROUP ID</span>
                        <span class="data-value" id="modal-group-number">--</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">MEMBERS</span>
                        <span class="data-value" id="modal-group-members">--</span>
                    </div>
                </div>

                <div class="qrcode" id="modal-qrcode"></div>
                <button class="action-btn" onclick="copyGroupNumber()">Join Frequency</button>
            </div>
        </div>
    </div>
    
    <div class="info-toast" id="info-toast">System Message</div>

    <!-- Three.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    
    <script src="assets/js/sprite-chat.js"></script>

    <script>
        // --- Configuration ---
        const CONFIG = {
            bloomStrength: 1.8,
            bloomRadius: 0.5,
            bloomThreshold: 0.2,
            ambientLight: 0.05,
            starCount: 6000,
            autoRotateSpeed: 0.3
        };

        // --- Global Variables ---
        let scene, camera, renderer, controls, composer;
        let planets = [];
        let sunMesh;
        let time = 0;
        let raycaster, mouse;
        
        const planetData = [
            {
                name: 'MUSE AURORA',
                cnName: '缪斯极光',
                color: 0x4169E1,
                atmosphereColor: 0x00ffff,
                type: 'Terrestrial',
                orbitRadius: 55,
                size: 4.5,
                speed: 0.003,
                description: '汇聚宇宙间的灵感碎片，这里是艺术家与梦想家的终极归宿。大气层中流淌着液态的灵感，每一次呼吸都是一次思维的觉醒。',
                groupNumber: 'GitscYee',
                groupMembers: 23
            },
            {
                name: 'LUMINARIA',
                cnName: '流光书海',
                color: 0xD3D3D3,
                atmosphereColor: 0xffffff,
                type: 'Satellite',
                orbitRadius: 75,
                size: 2.2,
                speed: 0.005,
                description: '漂浮在静谧虚空中的智慧结晶，表面刻满了宇宙真理的符文。这里没有喧嚣，只有对未知的永恒探索与沉思，每一道光都是一部未完的史诗。',
                groupNumber: 'GitscYee',
                groupMembers: 56
            },
            {
                name: 'NEON FORGE',
                cnName: '霓虹锻界',
                color: 0xFF4500,
                atmosphereColor: 0xff3300,
                type: 'Industrial',
                orbitRadius: 100,
                size: 4,
                speed: 0.002,
                description: '闪耀着赛博朋克光芒的未来世界。硅基生命与碳基生命的完美融合，每一个代码脉冲都在重塑现实的边界，废墟与霓虹在此共同孕育新文明。',
                groupNumber: 'GitscYee',
                groupMembers: 72
            },
            {
                name: 'WHISPER RING',
                cnName: '风语环廊',
                color: 0xDAA520,
                atmosphereColor: 0xffcc00,
                type: 'Gas Giant',
                orbitRadius: 140,
                size: 9,
                speed: 0.001,
                description: '巨大的气态行星，表面风暴涌动着全宇宙的信息流。它是星际网络的中枢，在这里，真相与流言在环廊间回响，像风一样穿梭于万千文明。',
                groupNumber: 'GitscYee',
                groupMembers: 70
            }
        ];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0015);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 40, 180);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = CONFIG.bloomThreshold;
            bloomPass.strength = CONFIG.bloomStrength;
            bloomPass.radius = CONFIG.bloomRadius;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 50;
            controls.maxDistance = 400;
            controls.autoRotate = true;
            controls.autoRotateSpeed = CONFIG.autoRotateSpeed;

            scene.add(new THREE.AmbientLight(0x404040, CONFIG.ambientLight));
            const sunLight = new THREE.PointLight(0xffffff, 1.5, 400);
            scene.add(sunLight);

            createStarfield();
            createSun();
            createPlanets();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('resize', onWindowResize, false);
            renderer.domElement.addEventListener('click', onMouseClick, false);
            setupUI();

            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = 0;
                setTimeout(() => loader.remove(), 1000);
            }, 1500);

            animate();
            
            // Initialize sprite chat
            if (window.SpriteChatManager) {
                window.spriteChatManager = new window.SpriteChatManager();
            }
        }

        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            for (let i = 0; i < CONFIG.starCount; i++) {
                positions.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
                const colorType = Math.random();
                let color = colorType > 0.9 ? new THREE.Color(0xadd8e6) : (colorType > 0.7 ? new THREE.Color(0xffd700) : new THREE.Color(0xffffff));
                colors.push(color.r, color.g, color.b);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const starField = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.8, sizeAttenuation: true }));
            scene.add(starField);
        }

        function createSun() {
            const geometry = new THREE.SphereGeometry(12, 64, 64);
            const material = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 }, color1: { value: new THREE.Color(0xffaa00) }, color2: { value: new THREE.Color(0xffddaa) } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `uniform float time; uniform vec3 color1; uniform vec3 color2; varying vec2 vUv; float noise(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); } void main() { vec2 p = vUv * 8.0; float n = noise(p + time * 0.2); vec3 finalColor = mix(color1, color2, n + 0.2); gl_FragColor = vec4(finalColor, 1.0); }`,
                side: THREE.DoubleSide
            });
            sunMesh = new THREE.Mesh(geometry, material);
            const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(13.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.15 }));
            sunMesh.add(sunGlow);
            scene.add(sunMesh);
        }

        function getAtmosphereMaterial(color) {
            return new THREE.ShaderMaterial({
                uniforms: { c: { type: "f", value: 0.7 }, p: { type: "f", value: 3.0 }, glowColor: { type: "c", value: new THREE.Color(color) }, viewVector: { type: "v3", value: camera.position } },
                vertexShader: `uniform vec3 viewVector; varying float intensity; void main() { vec3 vNormal = normalize(normalMatrix * normal); vec3 vNormel = normalize(normalMatrix * viewVector); intensity = pow(c - dot(vNormal, vNormel), p); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `uniform vec3 glowColor; varying float intensity; void main() { vec3 glow = glowColor * intensity; gl_FragColor = vec4(glow, 1.0); }`,
                side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true
            });
        }

        function createPlanets() {
            planetData.forEach(data => {
                const planetGroup = new THREE.Group();
                data.angle = Math.random() * Math.PI * 2;
                const planet = new THREE.Mesh(new THREE.SphereGeometry(data.size, 64, 64), new THREE.MeshPhysicalMaterial({ color: data.color, roughness: 0.6, metalness: 0.1, reflectivity: 0.2 }));
                planetGroup.add(planet);
                const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(data.size * 1.2, 64, 64), getAtmosphereMaterial(data.atmosphereColor));
                planet.add(atmosphere);
                planetGroup.atmosphere = atmosphere;
                const points = new THREE.EllipseCurve(0, 0, data.orbitRadius, data.orbitRadius, 0, 2 * Math.PI, false, 0).getPoints(128);
                const orbit = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 }));
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);
                planetGroup.userData = data;
                planet.userData = { parentGroup: planetGroup, ...data };
                scene.add(planetGroup);
                planets.push(planetGroup);
            });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); }

        function onMouseClick(event) {
            controls.autoRotate = false;
            setTimeout(() => { controls.autoRotate = true; }, 5000);
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(g => g.children[0]));
            if (intersects.length > 0) showModal(intersects[0].object.userData);
        }

        function showModal(data) {
            document.getElementById('modal-planet-name').innerText = data.cnName + ' / ' + data.name;
            document.getElementById('modal-planet-type').innerText = `CLASS: ${data.type} PLANET`;
            document.getElementById('modal-planet-description').innerText = data.description;
            document.getElementById('modal-group-number').innerText = data.groupNumber;
            document.getElementById('modal-group-members').innerText = data.groupMembers;
            let groupImage = data.cnName === '流光书海' ? 'images/READ_group.jpg' : 'images/AI_group.jpg';
            document.getElementById('modal-qrcode').innerHTML = `<img src="${groupImage}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" alt="QR Code">`;
            document.getElementById('planet-modal').classList.add('active');
        }

        function setupUI() {
            document.getElementById('close-modal').addEventListener('click', () => document.getElementById('planet-modal').classList.remove('active'));
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            if (sunMesh) { sunMesh.material.uniforms.time.value = time; sunMesh.rotation.y += 0.002; }
            planets.forEach(p => {
                const data = p.userData;
                data.angle += data.speed;
                p.position.set(Math.cos(data.angle) * data.orbitRadius, 0, Math.sin(data.angle) * data.orbitRadius);
                p.children[0].rotation.y += 0.01;
                if (p.atmosphere) p.atmosphere.material.uniforms.viewVector.value = new THREE.Vector3().subVectors(camera.position, p.position);
            });
            controls.update();
            composer.render();
        }

        window.copyGroupNumber = function() {
            const num = document.getElementById('modal-group-number').innerText;
            navigator.clipboard.writeText(num).then(() => {
                const toast = document.getElementById('info-toast');
                toast.innerText = 'FREQUENCY COPIED: ' + num;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        init();
    </script>
</body>
</html>
